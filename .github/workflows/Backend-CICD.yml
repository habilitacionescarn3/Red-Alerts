# =============================================================================
# RED ALERTS BACKEND CI/CD PIPELINE
# =============================================================================
# This workflow automatically deploys your Red Alerts backend infrastructure
# when you push changes to main (prod) or dev branches.
#
# WORKFLOW OVERVIEW:
# 1. Detects which environment to deploy based on git branch
# 2. Sets up AWS authentication using OIDC (no long-lived keys!)
# 3. Builds and pushes Docker image to ECR
# 4. Deploys infrastructure with Terraform using workspaces
# 5. Updates ECS to use the latest Docker image
# 6. Saves deployment outputs as artifacts for debugging
#
# REQUIRED GITHUB SECRETS:
# - ENV: Environment variables (contains AWS credentials, ECR URLs, etc.)
# - TERRAFORM_PROD: Production terraform variables (.tfvars content)
# - TERRAFORM_DEV: Development terraform variables (.tfvars content)
# =============================================================================

name: Backend CI/CD

# GitHub Actions permissions for AWS OIDC authentication
permissions:
  id-token: write # Required for OIDC token requests to AWS
  contents: read # Required to read repository contents

on:
  push:
    branches:
      - "main" # Production deployment
      - "dev" # Development deployment
    paths:
      - "Server/**"
      - ".github/workflows/Backend-CICD.yml"

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install npm dependencies
        run: npm install
        working-directory: Server

      # =================================================================
      # STEP 1: ENVIRONMENT SETUP
      # =================================================================
      - name: 🎯 Determine deployment environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
        # Smart environment detection:
        # - main branch = production environment
        # - dev branch = development environment

      - name: 🗂️ Create .env file from GitHub Secret
        run: |
          echo '${{ secrets.ENV }}' > .env
        working-directory: Server

      - name: 🗂️ Create Terraform variables file from GitHub Secret
        run: |
          if [[ "${{ steps.env.outputs.environment }}" == "prod" ]]; then
            echo '${{ secrets.TERRAFORM_PROD }}' > terraform/terraform-prod.tfvars
          else
            echo '${{ secrets.TERRAFORM_DEV }}' > terraform/terraform-dev.tfvars
          fi
        working-directory: Server

      - name: 📝 Load environment variables from .env file
        uses: falti/dotenv-action@v1.1.4
        with:
          path: Server/.env
          export-variables: true # Makes variables available to subsequent steps
          keys-case: bypass # Preserves original variable case
          mask-variables: true # Masks sensitive values in logs

      - name: 📝 Load terraform variables for selected environment
        uses: falti/dotenv-action@v1.1.4
        with:
          path: Server/terraform/terraform-${{ steps.env.outputs.environment }}.tfvars
          export-variables: true # Makes variables available to subsequent steps
          keys-case: bypass # Preserves original variable case
          mask-variables: true # Masks sensitive values in logs

      # =================================================================
      # STEP 2: AWS & INFRASTRUCTURE SETUP
      # =================================================================
      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/my-github-actions-role

      - name: 🔐 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: 🐳 Set up Docker Buildx for multi-platform builds
        uses: docker/setup-buildx-action@v3

      # =================================================================
      # STEP 3: TERRAFORM WORKSPACE SETUP WITH ENVIRONMENT-SPECIFIC STATE
      # =================================================================
      - name: 🛠️ Initialize Terraform with environment-specific state
        run: |
          if [[ "${{ steps.env.outputs.environment }}" == "prod" ]]; then
            npm run init:prod
          else
            npm run init:dev
          fi
        working-directory: Server

      - name: 🏗️ Create Terraform workspace if it doesn't exist
        run: npm run workspace:create
        working-directory: Server

      # =================================================================
      # STEP 4: DEPLOY USING NPM SCRIPTS
      # =================================================================
      - name: 🚀 Deploy infrastructure and application
        run: |
          if [[ "${{ steps.env.outputs.environment }}" == "prod" ]]; then
            npm run deploy:prod
          else
            npm run deploy:dev
          fi
        working-directory: Server
