name: Backend CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - "main"
      - "qa"
      - "dev"
    paths:
      - "Server/**"
      - ".github/workflows/Backend-CICD.yml"

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    # Branch -> environment: main=prod, qa=qa, everything else (dev)=dev.
    environment: ${{ (github.ref == 'refs/heads/main' && 'prod') || (github.ref == 'refs/heads/qa' && 'qa') ||(github.ref == 'refs/heads/dev' && 'dev') }}

    # All deploy config is exposed as env vars with the SAME names the Makefile
    # reads (locally those come from .env.<env>; here from GitHub secrets/vars).
    env:
      ENV: ${{ (github.ref == 'refs/heads/main' && 'prod') || (github.ref == 'refs/heads/qa' && 'qa') ||(github.ref == 'refs/heads/dev' && 'dev') }}
      # Repository variables / secrets (shared across environments).
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      CERT_ARN: ${{ secrets.CERT_ARN }}
      VPC_ID: ${{ secrets.VPC_ID }}
      SUBNET_IDS: ${{ secrets.SUBNET_IDS }}
      DB_SECURITY_GROUP_ID: ${{ secrets.DB_SECURITY_GROUP_ID }}
      HOSTED_ZONE: ${{ vars.HOSTED_ZONE }}
      # Environment-scoped variable / secret (differ per environment).
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      DATABASE_URL_CLOUD: ${{ secrets.DATABASE_URL_CLOUD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install npm dependencies
        run: npm install
        working-directory: Server

      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/my-github-actions-role

      - name: 🐳 Set up QEMU (cross-build the ARM64 worker image)
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧰 CDK bootstrap (idempotent)
        run: make bootstrap $ENV
        working-directory: Server

      - name: 🐳 Build & push worker image (keeps last 5 in ECR)
        run: make push-docker $ENV
        working-directory: Server

      - name: 🚀 CDK deploy
        run: make deploy $ENV
        working-directory: Server
