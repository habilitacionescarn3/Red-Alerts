name: Frontend CI/CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - "main"
      - "qa"
      - "dev"
    paths:
      - "Client/**"
      - ".github/workflows/Frontend-CICD.yml"

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    # Branch -> environment: main=prod, qa=qa, everything else (dev)=dev.
    # (Same mapping as Backend-CICD so both pipelines target the same account.)
    environment: ${{ (github.ref == 'refs/heads/main' && 'prod') || (github.ref == 'refs/heads/qa' && 'qa') || (github.ref == 'refs/heads/dev' && 'dev') }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      # Environment-scoped: each environment (dev/qa/prod) is a separate AWS
      # account, so this selects which account we deploy the client into. Matches
      # how Backend-CICD assumes the role.
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      # Environment name (matches `environment:` above) - used to build the
      # per-environment stack name below.
      ENV: ${{ (github.ref == 'refs/heads/main' && 'prod') || (github.ref == 'refs/heads/qa' && 'qa') || (github.ref == 'refs/heads/dev' && 'dev') }}
      # BASE stack name - keep in sync with APPLICATION.APP_NAME in
      # Server/constants.ts. Each environment deploys its OWN stack named
      # "<base>-<env>" (e.g. RedAlerts-prod), built in the resolve step.
      STACK_BASE_NAME: RedAlerts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: Client

      - name: Build
        run: npm run build
        working-directory: Client

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/my-github-actions-role

      # Bucket name + CloudFront distribution id come straight from the deployed
      # CDK stack's outputs, so the frontend always targets THIS environment's
      # bucket/distribution (resolved in the environment's own AWS account).
      - name: Resolve stack outputs (bucket + distribution)
        id: stack
        run: |
          STACK_NAME="$STACK_BASE_NAME-$ENV"
          echo "Reading outputs from stack '$STACK_NAME'"
          BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ClientBucketName'].OutputValue" \
            --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ] || [ -z "$DIST" ] || [ "$DIST" = "None" ]; then
            echo "::error::Could not resolve ClientBucketName / DistributionId from stack '$STACK_NAME'. Is the backend deployed in this environment's account?"
            exit 1
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
          echo "Resolved bucket=$BUCKET, distribution=$DIST"

      - name: Deploy to S3 and invalidate CloudFront
        run: |
          aws s3 sync ./Client/dist "s3://${{ steps.stack.outputs.bucket }}/" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.distribution }}" --paths "/*"
