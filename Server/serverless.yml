# ================================
# RED ALERTS SERVERLESS CONFIGURATION
# ================================
#
# This serverless.yml configures a complete serverless red alerts application with:
# - ECS service for continuous timestamp monitoring (getAlerts)
# - Lambda functions for API endpoints (saveAlerts)
# - S3 bucket for client files (React build)
# - CloudFront distribution for global CDN
# - Route 53 for custom domain routing
#
# DEPLOYMENT NOTES:
# 1. SSL Certificates - CREATE MANUALLY in ACM (us-east-1 region):
#    - Create certificate for dev.redalerts.shalev396.com (add ARN to CERTIFICATE_ARN_DEV)
#    - Create certificate for redalerts.shalev396.com (add ARN to CERTIFICATE_ARN_PROD)
# 2. Ensure you have a Route 53 hosted zone for shalev396.com
# 3. Deploy stages separately:
#    - DEV:  npm run deploy:dev  (creates dev.redalerts.shalev396.com)
#    - PROD: npm run deploy:prod (creates redalerts.shalev396.com)
# 4. Each stage gets its own complete infrastructure:
#    - Separate CloudFront distributions with custom domains
#    - Separate S3 buckets
#    - Separate API Gateways
#    - Separate ECS services
#    - Separate Route 53 records
#    - Uses manually created SSL certificates
# ================================

org: shalev396
app: red-alerts
service: Red-Alerts-Backend

frameworkVersion: "4"

provider:
  name: aws
  stage: ${opt:stage, 'dev'}
  runtime: python3.11
  timeout: 29
  region: il-central-1
  apiGateway:
    shouldStartNameWithService: true
  logs:
    restApi: false
  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  ecr:
    images:
      red-alerts-service:
        path: ./
        file: Dockerfile
  environment:
    # Environment Configuration
    ENV: ${self:provider.stage}

    # S3 Bucket Configuration (Stage-specific)
    S3_BUCKET_NAME: ${self:custom.clientBucketName.${self:provider.stage}}
    # CloudFront and Domain Configuration (Stage-specific)
    DOMAIN_NAME: ${self:custom.domainName.${self:provider.stage}}
    HOSTED_ZONE_ID: ${env:HOSTED_ZONE_ID}

    # Database Configuration (if needed in future)
    DATABASE_URL_LOCAL: ${env:DATABASE_URL_LOCAL, ''}
    DATABASE_URL_DEV: ${env:DATABASE_URL_DEV, ''}
    DATABASE_URL_PROD: ${env:DATABASE_URL_PROD, ''}

  iam:
    role:
      statements:
        # S3 Permissions for client bucket
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:PutObjectAcl
          Resource:
            - "arn:aws:s3:::${self:custom.clientBucketName.${self:provider.stage}}/*"

        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - "arn:aws:s3:::${self:custom.clientBucketName.${self:provider.stage}}"

        # CloudFront Permissions
        - Effect: Allow
          Action:
            - cloudfront:CreateInvalidation
            - cloudfront:GetInvalidation
            - cloudfront:ListInvalidations
          Resource: "*"

        # ECS Permissions
        - Effect: Allow
          Action:
            - ecs:DescribeServices
            - ecs:DescribeTasks
            - ecs:ListTasks
          Resource: "*"

        # ECR Permissions (matching your working example)
        - Effect: Allow
          Action: ecr:GetAuthorizationToken
          Resource: "*"
        - Effect: Allow
          Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            - ecr:InitiateLayerUpload
            - ecr:UploadLayerPart
            - ecr:CompleteLayerUpload
            - ecr:PutImage
          Resource: "*"

# Package Configuration
package:
  exclude:
    - node_modules/**
    - .git/**
    - .serverless/**
    - bin/**
    - __pycache__/**
    - "*.pyc"
    - .env
    - README.md
  include:
    - src/**

# Custom Configuration
custom:
  # ================================
  # STAGE-SPECIFIC CONFIGURATION
  # ================================
  # Domain names for different stages
  domainName:
    local: ${env:DOMAIN_NAME_LOCAL}
    dev: ${env:DOMAIN_NAME_DEV}
    prod: ${env:DOMAIN_NAME_PROD}

  # Client bucket names for different stages
  clientBucketName:
    local: ${env:S3_BUCKET_NAME_LOCAL}
    dev: ${env:S3_BUCKET_NAME_DEV}
    prod: ${env:S3_BUCKET_NAME_PROD}

  # CloudFront aliases - enable custom domains for both stages
  aliases:
    local:
      - ${self:custom.domainName.local}
    dev:
      - ${self:custom.domainName.dev}
    prod:
      - ${self:custom.domainName.prod}

  # SSL/TLS Certificate configuration - use manually created certificates
  viewerCertificate:
    local:
      AcmCertificateArn: ${env:CERTIFICATE_ARN_LOCAL}
      SslSupportMethod: sni-only
      MinimumProtocolVersion: TLSv1.2_2021
    dev:
      AcmCertificateArn: ${env:CERTIFICATE_ARN_DEV}
      SslSupportMethod: sni-only
      MinimumProtocolVersion: TLSv1.2_2021
    prod:
      AcmCertificateArn: ${env:CERTIFICATE_ARN_PROD}
      SslSupportMethod: sni-only
      MinimumProtocolVersion: TLSv1.2_2021

  # CloudFront distribution descriptions
  distributionComment:
    local: "Red Alerts Local"
    dev: "Red Alerts Development"
    prod: "Red Alerts Production"

  # ECS Service Configuration
  ecsConfig:
    clusterName: red-alerts-cluster-${self:provider.stage}
    serviceName: red-alerts-service-${self:provider.stage}
    taskDefinitionFamily: red-alerts-task-${self:provider.stage}

resources:
  Resources:
    # ================================
    # S3 BUCKET CONFIGURATION
    # ================================

    # S3 Bucket for Client Files (React Build)
    # This bucket will store the compiled React application files
    # Stage-specific:
    ClientFilesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.clientBucketName.${self:provider.stage}}
        # Enable public read access for static website hosting
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        # Configure for static website hosting
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html # SPA routing support
        # Enable versioning for better deployment management
        VersioningConfiguration:
          Status: Enabled
        # Lifecycle configuration to manage costs
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldVersions
              Status: Enabled
              NoncurrentVersionExpirationInDays: 30
        # CORS configuration for web access
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ["*"]
              AllowedMethods: [GET, HEAD]
              AllowedOrigins: ["*"]
              MaxAge: 3600

    # S3 Bucket Policy for Client Files - Allow CloudFront and public read access
    ClientFilesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: ClientFilesBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: "*"
              Action: s3:GetObject
              Resource:
                - Fn::Join:
                    - ""
                    - - "arn:aws:s3:::"
                      - Ref: ClientFilesBucket
                      - "/*"

    # ================================
    # CLOUDFRONT DISTRIBUTION
    # ================================

    # CloudFront Distribution - CDN for global content delivery
    # Combines API Gateway and client files under one domain
    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          # Description for the distribution
          Comment: "Red Alerts ${self:provider.stage} - CloudFront Distribution"

          # Enable the distribution
          Enabled: true

          # Domain aliases - the custom domain names (stage-specific)
          Aliases: ${self:custom.aliases.${self:provider.stage}}

          # SSL/TLS Certificate configuration
          ViewerCertificate: ${self:custom.viewerCertificate.${self:provider.stage}}

          # Default cache behavior for /* - serves React app
          DefaultCacheBehavior:
            TargetOriginId: ClientFilesOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            # Cache policy for SPA - optimized caching for both HTML and assets
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # Managed-CORS-S3Origin

          # Additional cache behaviors for specific paths
          # PRIORITY ORDER (evaluated top to bottom):
          # 1. /api/* → API Gateway
          # 2. /* → Client files (default behavior)
          CacheBehaviors:
            # PRIORITY 1: API Gateway behavior - /api/* routes to API Gateway
            - PathPattern: "/api/*"
              TargetOriginId: ApiGatewayOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
              CachedMethods: [GET, HEAD, OPTIONS]
              Compress: true
              # No caching for API calls
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingDisabled
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # Managed-AllViewerExceptHostHeader

          # Origins configuration - where CloudFront fetches content from
          Origins:
            # Origin for React app files (S3 bucket)
            - Id: ClientFilesOrigin
              DomainName:
                Fn::GetAtt:
                  - ClientFilesBucket
                  - RegionalDomainName
              S3OriginConfig:
                OriginAccessIdentity: ""

            # Origin for API Gateway
            - Id: ApiGatewayOrigin
              DomainName:
                Fn::Sub: "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
              CustomOriginConfig:
                HTTPPort: 443
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]

          # Error pages configuration for SPA routing
          CustomErrorResponses:
            # Redirect 403/404 to index.html for client-side routing
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 300
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 300

          # Price class - use all edge locations for best performance
          PriceClass: PriceClass_All

          # HTTP version
          HttpVersion: http2

          # IPv6 support
          IPV6Enabled: true

    # ================================
    # ROUTE 53 CONFIGURATION
    # ================================

    # Route 53 Record - Points custom domain to CloudFront distribution
    # Creates A records for both dev and prod stages
    Route53Record:
      Type: AWS::Route53::RecordSet
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name: ${self:custom.domainName.${self:provider.stage}}
        Type: A
        # Alias configuration - points to CloudFront distribution
        AliasTarget:
          DNSName:
            Fn::GetAtt:
              - CloudFrontDistribution
              - DomainName
          HostedZoneId: Z2FDTNDATAQYW2 # CloudFront hosted zone ID (global)
          EvaluateTargetHealth: false

    # ================================
    # ECS INFRASTRUCTURE
    # ================================

    # ECS Cluster
    RedAlertsCluster:
      Type: AWS::ECS::Cluster
      Properties:
        ClusterName: ${self:custom.ecsConfig.clusterName}
        CapacityProviders:
          - FARGATE
          - FARGATE_SPOT
        DefaultCapacityProviderStrategy:
          - CapacityProvider: FARGATE_SPOT
            Weight: 1

    # ECR Repository is automatically created by Serverless Framework

    # IAM Role for ECS Task Execution
    ECSTaskExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ecs-tasks.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        Policies:
          - PolicyName: ECRAccess
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - ecr:GetAuthorizationToken
                    - ecr:BatchCheckLayerAvailability
                    - ecr:GetDownloadUrlForLayer
                    - ecr:BatchGetImage
                  Resource: "*"

    # ECS Task Definition
    RedAlertsTaskDefinition:
      Type: AWS::ECS::TaskDefinition
      Properties:
        Family: ${self:custom.ecsConfig.taskDefinitionFamily}
        NetworkMode: awsvpc
        RequiresCompatibilities:
          - FARGATE
        Cpu: 256 # Smallest CPU allocation (0.25 vCPU)
        Memory: 512 # Smallest memory allocation (0.5 GB)
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
        ContainerDefinitions:
          - Name: red-alerts-container
            Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/serverless-red-alerts-backend-${self:provider.stage}:red-alerts-service"
            Essential: true
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref CloudWatchLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: ecs

    # CloudWatch Log Group
    CloudWatchLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /ecs/red-alerts-service
        RetentionInDays: 7

    # Default VPC and Subnet (for simplicity)
    DefaultVPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsHostnames: true
        EnableDnsSupport: true
        Tags:
          - Key: Name
            Value: red-alerts-vpc

    DefaultSubnet:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref DefaultVPC
        CidrBlock: 10.0.1.0/24
        AvailabilityZone: !Select [0, !GetAZs ""]
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: red-alerts-subnet

    InternetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value: red-alerts-igw

    AttachGateway:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref DefaultVPC
        InternetGatewayId: !Ref InternetGateway

    PublicRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref DefaultVPC
        Tags:
          - Key: Name
            Value: red-alerts-route-table

    PublicRoute:
      Type: AWS::EC2::Route
      DependsOn: AttachGateway
      Properties:
        RouteTableId: !Ref PublicRouteTable
        DestinationCidrBlock: 0.0.0.0/0
        GatewayId: !Ref InternetGateway

    SubnetRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref DefaultSubnet
        RouteTableId: !Ref PublicRouteTable

    # Security Group
    ECSSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Red Alerts ECS service
        VpcId: !Ref DefaultVPC
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0

    # ECS Service
    RedAlertsService:
      Type: AWS::ECS::Service
      DependsOn:
        - RedAlertsTaskDefinition
        - ECSTaskExecutionRole
      Properties:
        ServiceName: ${self:custom.ecsConfig.serviceName}
        Cluster: !Ref RedAlertsCluster
        TaskDefinition: !Ref RedAlertsTaskDefinition
        DesiredCount: 1
        LaunchType: FARGATE
        NetworkConfiguration:
          AwsvpcConfiguration:
            SecurityGroups:
              - !Ref ECSSecurityGroup
            Subnets:
              - !Ref DefaultSubnet
            AssignPublicIp: ENABLED
        # Enable service discovery and health checks
        HealthCheckGracePeriodSeconds: 60

    # Docker image automatically built and pushed by Serverless Framework

  Outputs:
    # Frontend Infrastructure Outputs
    ClientBucketName:
      Description: Name of the S3 Client Files Bucket
      Value: !Ref ClientFilesBucket

    CloudFrontDistributionId:
      Description: CloudFront Distribution ID
      Value: !Ref CloudFrontDistribution

    CloudFrontDomainName:
      Description: CloudFront Distribution Domain Name
      Value: !GetAtt CloudFrontDistribution.DomainName

    WebsiteURL:
      Description: Website URL
      Value: "https://${self:custom.domainName.${self:provider.stage}}"

    # Backend Infrastructure Outputs
    ECSClusterName:
      Description: Name of the ECS Cluster
      Value: !Ref RedAlertsCluster

    ECSServiceName:
      Description: Name of the ECS Service
      Value: !Ref RedAlertsService

    ApiGatewayEndpoint:
      Description: API Gateway Endpoint URL
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

    ECRRepositoryURI:
      Description: ECR Repository URI for Docker images
      Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/serverless-red-alerts-backend-${self:provider.stage}"

# Lambda functions using Python handlers
functions:
  saveAlerts:
    runtime: python3.11
    handler: src/handlers/saveAlerts.lambda_handler
    timeout: 29
    events:
      - httpApi:
          path: /api/alerts
          method: post

  # Health check function for API
  health:
    runtime: python3.11
    handler: src/handlers/health.lambda_handler
    timeout: 29
    events:
      - httpApi:
          path: /api/health
          method: get

plugins:
  - serverless-offline
